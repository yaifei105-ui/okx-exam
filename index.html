<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>欧易商家考试 · 刷题与模拟考</title>
<style>
  :root{
    --bg:#0f172a; --panel:#1e293b; --panel2:#273449; --line:#334155;
    --text:#e2e8f0; --mute:#94a3b8; --accent:#22d3ee; --accent2:#a78bfa;
    --ok:#22c55e; --warn:#f59e0b; --err:#ef4444;
  }
  *{box-sizing:border-box}
  html,body{margin:0;padding:0;background:linear-gradient(160deg,#0b1220,#111c34);color:var(--text);font-family:-apple-system,BlinkMacSystemFont,"Segoe UI","PingFang SC","Microsoft YaHei",sans-serif;min-height:100vh}
  a{color:var(--accent);text-decoration:none}
  button{font:inherit}
  .container{max-width:960px;margin:0 auto;padding:24px 16px 80px}
  header{display:flex;justify-content:space-between;align-items:flex-end;flex-wrap:wrap;gap:12px;margin-bottom:18px}
  h1{font-size:22px;margin:0}
  h1 .sub{font-size:13px;color:var(--mute);font-weight:400;margin-left:8px}
  .user-bar{display:flex;align-items:center;gap:8px;font-size:13px;color:var(--mute)}
  .user-bar input{background:#0b1220;border:1px solid var(--line);color:var(--text);padding:6px 10px;border-radius:8px;outline:none;width:120px}
  .user-bar input:focus{border-color:var(--accent)}
  nav.tabs{display:flex;gap:6px;background:var(--panel);padding:6px;border-radius:14px;border:1px solid var(--line);margin-bottom:18px;flex-wrap:wrap}
  nav.tabs button{background:transparent;border:0;color:var(--mute);padding:10px 16px;border-radius:10px;cursor:pointer;font-size:14px;flex:1;min-width:120px}
  nav.tabs button.active{background:linear-gradient(135deg,#0ea5e9,#7c3aed);color:#fff;box-shadow:0 4px 14px rgba(124,58,237,.3)}
  .panel{background:var(--panel);border:1px solid var(--line);border-radius:16px;padding:18px;margin-bottom:14px}
  .panel h2{margin:0 0 12px;font-size:15px;color:var(--mute);font-weight:500;letter-spacing:.5px}
  .row{display:flex;flex-wrap:wrap;gap:8px;align-items:center}
  .btn{background:#0b1220;border:1px solid var(--line);color:var(--text);padding:8px 14px;border-radius:10px;cursor:pointer;font-size:13px;transition:all .15s}
  .btn:hover{border-color:var(--accent);color:var(--accent)}
  .btn.primary{background:linear-gradient(135deg,#0ea5e9,#7c3aed);border:0;color:#fff}
  .btn.primary:hover{filter:brightness(1.1);color:#fff}
  .btn.ghost{background:transparent}
  .btn.danger{border-color:var(--err);color:var(--err)}
  .btn.danger:hover{background:rgba(239,68,68,.1)}
  .pill{display:inline-block;padding:3px 10px;border-radius:999px;font-size:12px;background:rgba(34,211,238,.12);color:var(--accent);border:1px solid rgba(34,211,238,.3)}
  .pill.cat{background:rgba(167,139,250,.12);color:var(--accent2);border-color:rgba(167,139,250,.3)}
  select,input[type="search"],input[type="number"]{background:#0b1220;border:1px solid var(--line);color:var(--text);padding:8px 12px;border-radius:10px;font-size:13px;outline:none}
  select:focus,input:focus{border-color:var(--accent)}
  .qcard{background:var(--panel2);border:1px solid var(--line);border-radius:14px;padding:20px;margin:14px 0}
  .qhead{display:flex;justify-content:space-between;align-items:center;gap:8px;margin-bottom:12px;flex-wrap:wrap}
  .qhead .meta{display:flex;gap:6px;align-items:center;flex-wrap:wrap}
  .qtext{font-size:17px;line-height:1.7;margin:6px 0 14px;font-weight:500}
  .answer-box{background:#0b1220;border-left:3px solid var(--ok);padding:12px 14px;border-radius:0 10px 10px 0;line-height:1.7;white-space:pre-wrap;color:#bbf7d0}
  .answer-box.hidden{display:none}
  .toolbar{display:flex;justify-content:space-between;align-items:center;gap:12px;margin-top:14px;flex-wrap:wrap}
  .progress-bar{height:6px;background:#0b1220;border-radius:99px;overflow:hidden;margin-top:8px}
  .progress-bar > span{display:block;height:100%;background:linear-gradient(90deg,#22d3ee,#a78bfa);transition:width .25s}
  .stats{display:grid;grid-template-columns:repeat(auto-fit,minmax(140px,1fr));gap:10px;margin-bottom:14px}
  .stat{background:var(--panel2);border:1px solid var(--line);border-radius:12px;padding:12px}
  .stat .num{font-size:24px;font-weight:600;background:linear-gradient(135deg,#22d3ee,#a78bfa);-webkit-background-clip:text;-webkit-text-fill-color:transparent}
  .stat .lbl{font-size:12px;color:var(--mute);margin-top:2px}
  textarea{width:100%;min-height:90px;background:#0b1220;border:1px solid var(--line);color:var(--text);border-radius:10px;padding:10px;font:inherit;resize:vertical;outline:none}
  textarea:focus{border-color:var(--accent)}
  .quiz-result{padding:14px;border-radius:12px;margin-top:10px;border:1px solid}
  .quiz-result.ok{border-color:var(--ok);background:rgba(34,197,94,.08)}
  .quiz-result.miss{border-color:var(--warn);background:rgba(245,158,11,.08)}
  .listitem{padding:12px 14px;border-bottom:1px solid var(--line);cursor:pointer;display:flex;justify-content:space-between;gap:10px;align-items:center}
  .listitem:hover{background:rgba(255,255,255,.03)}
  .listitem:last-child{border-bottom:0}
  .listitem .lq{flex:1;line-height:1.5}
  .empty{padding:36px;text-align:center;color:var(--mute)}
  .footer{text-align:center;color:var(--mute);font-size:12px;margin-top:30px}
  kbd{background:#0b1220;border:1px solid var(--line);padding:2px 6px;border-radius:4px;font-size:11px;color:var(--mute)}
  details{background:#0b1220;border:1px solid var(--line);border-radius:10px;padding:8px 12px;margin-top:10px}
  details summary{cursor:pointer;color:var(--mute);font-size:13px}
  @media (max-width:640px){
    .container{padding:14px}
    nav.tabs button{padding:8px 10px;font-size:13px}
    h1{font-size:18px}
    .qtext{font-size:15px}
  }
</style>
</head>
<body>
<div class="container">
  <header>
    <h1>欧易商家考试 · 刷题工具<span class="sub">本地进度自动保存 · 多人各自双击使用</span></h1>
    <div class="user-bar">
      <span>👤 当前用户</span>
      <input id="userName" placeholder="昵称" maxlength="12" />
      <span title="不同昵称的进度互相独立">🔒</span>
    </div>
  </header>

  <nav class="tabs" id="tabs">
    <button data-tab="practice" class="active">📚 刷题</button>
    <button data-tab="exam">📝 模拟考试</button>
    <button data-tab="wrong">❌ 错题本</button>
    <button data-tab="search">🔍 搜索</button>
    <button data-tab="all">📋 题目总览</button>
  </nav>

  <!-- 刷题 -->
  <section id="tab-practice">
    <div class="panel">
      <div class="row" style="justify-content:space-between">
        <div class="row">
          <label>顺序：</label>
          <select id="orderMode">
            <option value="seq">顺序</option>
            <option value="random">随机</option>
          </select>
          <label>分类：</label>
          <select id="catFilter"><option value="">全部</option></select>
          <label>显示：</label>
          <select id="showMode">
            <option value="show">看答案</option>
            <option value="hide">隐藏（自测）</option>
          </select>
        </div>
        <button class="btn ghost" id="resetProgress" title="清空当前用户的刷题进度（不影响错题本）">↻ 重置进度</button>
      </div>
      <div class="progress-bar"><span id="progressFill" style="width:0%"></span></div>
      <div style="margin-top:6px;font-size:12px;color:var(--mute)" id="progressText">0 / 0</div>
    </div>

    <div id="practiceCard"></div>
  </section>

  <!-- 模拟考试 -->
  <section id="tab-exam" hidden>
    <div class="panel">
      <h2>选择考试模式</h2>
      <div class="row" style="gap:12px">
        <button class="btn primary" data-exam-mode="batch">📋 一次性 N 题，最后打分</button>
        <button class="btn primary" data-exam-mode="instant">⚡ 一题一答，即时反馈</button>
      </div>
      <div class="row" style="margin-top:14px">
        <label>题目数：</label>
        <input type="number" id="examCount" min="5" max="128" value="20" style="width:80px" />
        <label>覆盖分类：</label>
        <select id="examCat"><option value="">全部分类</option></select>
        <span style="font-size:12px;color:var(--mute)">题目从题库中随机抽取，每次不重复</span>
      </div>
    </div>
    <div id="examArea"></div>
  </section>

  <!-- 错题本 -->
  <section id="tab-wrong" hidden>
    <div class="panel">
      <div class="row" style="justify-content:space-between">
        <div>
          <span class="pill" id="wrongCount">0 题</span>
          <span style="color:var(--mute);font-size:12px;margin-left:8px">模考答错的题目会自动加入这里</span>
        </div>
        <div class="row">
          <button class="btn" id="practiceWrong">📚 刷错题</button>
          <button class="btn danger" id="clearWrong">清空错题本</button>
        </div>
      </div>
    </div>
    <div class="panel" id="wrongList"></div>
  </section>

  <!-- 搜索 -->
  <section id="tab-search" hidden>
    <div class="panel">
      <input type="search" id="searchInput" placeholder="输入关键词搜索题目或答案，例如：验证单 / USDT / T+1" style="width:100%;font-size:15px" />
    </div>
    <div class="panel" id="searchList">
      <div class="empty">输入关键词开始搜索</div>
    </div>
  </section>

  <!-- 全部题目 -->
  <section id="tab-all" hidden>
    <div class="panel">
      <div class="stats" id="catStats"></div>
    </div>
    <div class="panel" id="allList"></div>
  </section>

  <div class="footer">
    本工具仅用于学习背题。题库共 <span id="totalQs">0</span> 道，进度保存在你浏览器本地（不上传）。
  </div>
</div>

/* ============================================================
 *  状态：每个用户昵称对应一份独立 LocalStorage namespace
 * ============================================================ */
const STORE_PREFIX = "okx_exam_v1::";
let currentUser = "";
let currentIndex = 0;
let practiceList = [];   // 当前刷题序列（顺序或随机后）
let examState = null;    // 模考运行时

const $ = (sel) => document.querySelector(sel);
const $$ = (sel) => document.querySelectorAll(sel);

function userKey(name){ return STORE_PREFIX + (name || "default"); }
function loadUserData(){
  try{
    const raw = localStorage.getItem(userKey(currentUser));
    if(!raw) return defaultUserData();
    const d = JSON.parse(raw);
    return Object.assign(defaultUserData(), d);
  }catch(e){ return defaultUserData(); }
}
function defaultUserData(){
  return { practiceIdx: 0, orderMode: "seq", catFilter: "", showMode: "show", wrong: [], lastExam: null };
}
function saveUserData(d){
  localStorage.setItem(userKey(currentUser), JSON.stringify(d));
}
function patchUserData(patch){
  const d = loadUserData();
  Object.assign(d, patch);
  saveUserData(d);
  return d;
}

/* ============================================================
 *  题库 + 分类
 * ============================================================ */
const QUESTIONS = window.__QUESTIONS__ || [];
const CATEGORIES = [...new Set(QUESTIONS.map(q => q.category))];

function fillCategorySelects(){
  const opts = '<option value="">全部</option>' + CATEGORIES.map(c =>
    `<option value="${c}">${c} (${QUESTIONS.filter(q=>q.category===c).length})</option>`
  ).join("");
  $("#catFilter").innerHTML = opts;
  $("#examCat").innerHTML = '<option value="">全部分类</option>' + CATEGORIES.map(c =>
    `<option value="${c}">${c}</option>`).join("");
}

function getFilteredList(catFilter){
  if(!catFilter) return QUESTIONS.slice();
  return QUESTIONS.filter(q => q.category === catFilter);
}

function shuffle(arr){
  const a = arr.slice();
  for(let i=a.length-1;i>0;i--){
    const j = Math.floor(Math.random()*(i+1));
    [a[i],a[j]] = [a[j],a[i]];
  }
  return a;
}

/* ============================================================
 *  Tabs
 * ============================================================ */
$$("#tabs button").forEach(b => b.addEventListener("click", () => {
  $$("#tabs button").forEach(x => x.classList.remove("active"));
  b.classList.add("active");
  const tab = b.dataset.tab;
  ["practice","exam","wrong","search","all"].forEach(t => {
    $("#tab-" + t).hidden = (t !== tab);
  });
  if(tab === "wrong") renderWrong();
  if(tab === "all") renderAll();
}));

/* ============================================================
 *  刷题
 * ============================================================ */
function rebuildPracticeList(){
  const d = loadUserData();
  let list = getFilteredList(d.catFilter);
  if(d.orderMode === "random") list = shuffle(list);
  practiceList = list;
  if(currentIndex >= list.length) currentIndex = 0;
}

function renderPractice(){
  const d = loadUserData();
  $("#orderMode").value = d.orderMode;
  $("#catFilter").value = d.catFilter;
  $("#showMode").value = d.showMode;
  if(!practiceList.length) rebuildPracticeList();
  const total = practiceList.length;
  const idx = Math.min(currentIndex, total - 1);
  const q = practiceList[idx];
  $("#progressFill").style.width = total ? ((idx + 1) / total * 100) + "%" : "0%";
  $("#progressText").textContent = `${idx + 1} / ${total}（当前用户：${currentUser || "默认"}）`;
  if(!q){
    $("#practiceCard").innerHTML = '<div class="panel empty">该分类下暂无题目</div>';
    return;
  }
  const hidden = d.showMode === "hide";
  $("#practiceCard").innerHTML = `
    <div class="qcard">
      <div class="qhead">
        <div class="meta">
          <span class="pill">第 ${q.no} 题</span>
          <span class="pill cat">${q.category}</span>
        </div>
        <span style="color:var(--mute);font-size:12px">${idx+1}/${total}</span>
      </div>
      <div class="qtext">${escapeHtml(q.question)}</div>
      <div class="answer-box ${hidden ? 'hidden' : ''}" id="answerBox"><strong>参考答案：</strong>\n${escapeHtml(q.answer)}</div>
      <div class="toolbar">
        <div class="row">
          <button class="btn" id="prevBtn">← 上一题</button>
          <button class="btn primary" id="nextBtn">下一题 →</button>
          ${hidden ? '<button class="btn" id="toggleAns">👀 显示答案</button>' : '<button class="btn ghost" id="toggleAns">隐藏答案</button>'}
        </div>
        <span style="color:var(--mute);font-size:12px">快捷键：← / → 翻页，空格切换答案</span>
      </div>
    </div>
  `;
  $("#prevBtn").onclick = () => { currentIndex = (idx - 1 + total) % total; renderPractice(); };
  $("#nextBtn").onclick = () => { currentIndex = (idx + 1) % total; patchUserData({practiceIdx:currentIndex}); renderPractice(); };
  $("#toggleAns").onclick = () => {
    const box = $("#answerBox");
    box.classList.toggle("hidden");
  };
}

function escapeHtml(s){
  return String(s).replace(/[&<>"']/g, m => ({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"}[m]));
}

/* 刷题事件 */
["orderMode","catFilter","showMode"].forEach(id => {
  $("#" + id).addEventListener("change", e => {
    const v = e.target.value;
    const patch = {};
    patch[id] = v;
    patchUserData(patch);
    if(id !== "showMode"){ currentIndex = 0; rebuildPracticeList(); }
    renderPractice();
  });
});
$("#resetProgress").onclick = () => {
  if(!confirm("确认清空 " + (currentUser||"默认") + " 的刷题进度？（错题本不受影响）")) return;
  currentIndex = 0;
  patchUserData({practiceIdx:0});
  renderPractice();
};

document.addEventListener("keydown", e => {
  if(["INPUT","TEXTAREA","SELECT"].includes(e.target.tagName)) return;
  if($("#tab-practice").hidden) return;
  if(e.key === "ArrowLeft") $("#prevBtn")?.click();
  else if(e.key === "ArrowRight") $("#nextBtn")?.click();
  else if(e.code === "Space"){ e.preventDefault(); $("#toggleAns")?.click(); }
});

/* ============================================================
 *  模拟考试
 * ============================================================ */
$$('[data-exam-mode]').forEach(b => b.addEventListener("click", () => startExam(b.dataset.examMode)));

function startExam(mode){
  const n = Math.max(1, Math.min(QUESTIONS.length, parseInt($("#examCount").value)||20));
  const cat = $("#examCat").value;
  const pool = getFilteredList(cat);
  if(pool.length < n){
    alert(`该分类只有 ${pool.length} 题，少于设定的 ${n} 题。请减少题目数或选其他分类。`);
    return;
  }
  const picked = shuffle(pool).slice(0, n);
  examState = { mode, list: picked, idx: 0, answers: new Array(picked.length).fill(""), submitted: false, judge: new Array(picked.length).fill(null) };
  renderExam();
}

function renderExam(){
  if(!examState){ $("#examArea").innerHTML = ""; return; }
  const { mode, list, idx, answers, submitted, judge } = examState;
  if(mode === "instant"){
    const q = list[idx];
    const done = idx >= list.length;
    if(done){
      const correct = judge.filter(x=>x==="ok").length;
      $("#examArea").innerHTML = examSummaryHtml(list, answers, judge, correct);
      bindSummary();
      return;
    }
    $("#examArea").innerHTML = `
      <div class="panel">
        <div class="qhead">
          <div class="meta">
            <span class="pill">即时反馈模式</span>
            <span class="pill cat">${list[idx].category}</span>
          </div>
          <span style="color:var(--mute);font-size:12px">${idx+1} / ${list.length}</span>
        </div>
        <div class="qtext">${escapeHtml(q.question)}</div>
        <textarea id="examAns" placeholder="请用自己的话作答，然后点【对照答案】查看标准答案并自评对错"></textarea>
        <div class="toolbar">
          <button class="btn primary" id="checkBtn">对照答案</button>
        </div>
        <div id="examFeedback"></div>
      </div>
    `;
    $("#checkBtn").onclick = () => {
      const v = $("#examAns").value.trim();
      examState.answers[idx] = v;
      $("#examFeedback").innerHTML = `
        <div class="answer-box" style="margin-top:12px"><strong>参考答案：</strong>\n${escapeHtml(q.answer)}</div>
        <div class="row" style="margin-top:10px">
          <span style="color:var(--mute)">你觉得自己答的：</span>
          <button class="btn" data-judge="ok" style="border-color:var(--ok);color:var(--ok)">✅ 对</button>
          <button class="btn" data-judge="miss" style="border-color:var(--err);color:var(--err)">❌ 错</button>
        </div>
      `;
      $$("[data-judge]").forEach(btn => btn.onclick = () => {
        const j = btn.dataset.judge;
        examState.judge[idx] = j;
        if(j === "miss") addWrong(q.id);
        examState.idx++;
        renderExam();
      });
    };
  } else {
    // batch
    if(submitted){
      const correct = judge.filter(x=>x==="ok").length;
      $("#examArea").innerHTML = examSummaryHtml(list, answers, judge, correct);
      bindSummary();
      return;
    }
    $("#examArea").innerHTML = `
      <div class="panel">
        <h2>共 ${list.length} 题，全部填完后点底部"提交考试"</h2>
        <div id="examQs">
          ${list.map((q,i)=>`
            <div class="qcard">
              <div class="qhead">
                <div class="meta">
                  <span class="pill">第 ${i+1} 题</span>
                  <span class="pill cat">${q.category}</span>
                </div>
              </div>
              <div class="qtext">${escapeHtml(q.question)}</div>
              <textarea data-i="${i}" placeholder="作答...">${escapeHtml(answers[i]||"")}</textarea>
            </div>
          `).join("")}
        </div>
        <div class="toolbar">
          <button class="btn primary" id="submitExam">📝 提交考试，对照答案</button>
          <button class="btn ghost" id="cancelExam">取消</button>
        </div>
      </div>
    `;
    $$("#examQs textarea").forEach(t => t.addEventListener("input", e => {
      examState.answers[parseInt(e.target.dataset.i)] = e.target.value;
    }));
    $("#submitExam").onclick = () => { examState.submitted = true; renderExam(); };
    $("#cancelExam").onclick = () => { if(confirm("放弃本次考试？")){ examState = null; $("#examArea").innerHTML=""; } };
  }
}

function examSummaryHtml(list, answers, judge, correct){
  const total = list.length;
  return `
    <div class="panel">
      <h2>考试结果</h2>
      <div class="stats">
        <div class="stat"><div class="num">${total}</div><div class="lbl">总题数</div></div>
        <div class="stat"><div class="num">${correct}</div><div class="lbl">答对</div></div>
        <div class="stat"><div class="num">${total - correct}</div><div class="lbl">答错/未判</div></div>
        <div class="stat"><div class="num">${total ? Math.round(correct/total*100) : 0}%</div><div class="lbl">正确率</div></div>
      </div>
      <div class="row">
        <button class="btn primary" id="reExam">🔁 再来一次</button>
        <button class="btn" id="exitExam">返回</button>
      </div>
    </div>
    ${list.map((q,i)=>{
      const j = judge[i];
      const cls = j === "ok" ? "ok" : "miss";
      const userAns = answers[i] ? escapeHtml(answers[i]) : "<em style='color:var(--mute)'>（未作答）</em>";
      return `
        <div class="qcard">
          <div class="qhead">
            <div class="meta">
              <span class="pill">第 ${i+1} 题</span>
              <span class="pill cat">${q.category}</span>
              ${j === "ok" ? '<span class="pill" style="background:rgba(34,197,94,.15);color:var(--ok);border-color:rgba(34,197,94,.3)">✅ 已答对</span>' : ''}
              ${j === "miss" ? '<span class="pill" style="background:rgba(239,68,68,.15);color:var(--err);border-color:rgba(239,68,68,.3)">❌ 已加入错题本</span>' : ''}
              ${j === null ? '<span class="pill" style="background:rgba(245,158,11,.15);color:var(--warn);border-color:rgba(245,158,11,.3)">待自评</span>' : ''}
            </div>
          </div>
          <div class="qtext">${escapeHtml(q.question)}</div>
          <div style="background:#0b1220;border-left:3px solid var(--accent);padding:10px 12px;border-radius:0 10px 10px 0;margin-bottom:8px"><strong style="color:var(--accent)">你的答案：</strong>\n${userAns}</div>
          <div class="answer-box"><strong>参考答案：</strong>\n${escapeHtml(q.answer)}</div>
          ${j === null ? `
            <div class="row" style="margin-top:10px">
              <span style="color:var(--mute)">自评：</span>
              <button class="btn" data-bj="ok" data-i="${i}" data-qid="${q.id}" style="border-color:var(--ok);color:var(--ok)">✅ 对</button>
              <button class="btn" data-bj="miss" data-i="${i}" data-qid="${q.id}" style="border-color:var(--err);color:var(--err)">❌ 错</button>
            </div>
          ` : ''}
        </div>
      `;
    }).join("")}
  `;
}

function bindSummary(){
  $("#reExam")?.addEventListener("click", () => startExam(examState.mode));
  $("#exitExam")?.addEventListener("click", () => { examState = null; $("#examArea").innerHTML=""; });
  $$('[data-bj]').forEach(btn => btn.onclick = () => {
    const i = parseInt(btn.dataset.i);
    const qid = btn.dataset.qid;
    const j = btn.dataset.bj;
    examState.judge[i] = j;
    if(j === "miss") addWrong(qid);
    renderExam();
  });
}

/* ============================================================
 *  错题本
 * ============================================================ */
function addWrong(qid){
  const d = loadUserData();
  if(!d.wrong.includes(qid)){ d.wrong.push(qid); saveUserData(d); }
}
function removeWrong(qid){
  const d = loadUserData();
  d.wrong = d.wrong.filter(x => x !== qid);
  saveUserData(d);
}
function renderWrong(){
  const d = loadUserData();
  $("#wrongCount").textContent = d.wrong.length + " 题";
  if(!d.wrong.length){
    $("#wrongList").innerHTML = '<div class="empty">还没有错题。完成模拟考试时自评为"错"会自动加入这里。</div>';
    return;
  }
  const items = d.wrong.map(qid => QUESTIONS.find(q => q.id === qid)).filter(Boolean);
  $("#wrongList").innerHTML = items.map(q => `
    <div class="listitem">
      <div class="lq">
        <div><span class="pill cat">${q.category}</span> <strong>${escapeHtml(q.question)}</strong></div>
        <details><summary>查看答案</summary><div style="margin-top:6px;color:#bbf7d0">${escapeHtml(q.answer)}</div></details>
      </div>
      <button class="btn danger" data-rmwrong="${q.id}">移除</button>
    </div>
  `).join("");
  $$('[data-rmwrong]').forEach(b => b.onclick = () => { removeWrong(b.dataset.rmwrong); renderWrong(); });
}
$("#clearWrong").onclick = () => {
  if(!confirm("清空错题本？")) return;
  patchUserData({wrong:[]});
  renderWrong();
};
$("#practiceWrong").onclick = () => {
  const d = loadUserData();
  if(!d.wrong.length){ alert("错题本是空的"); return; }
  practiceList = d.wrong.map(id => QUESTIONS.find(q=>q.id===id)).filter(Boolean);
  currentIndex = 0;
  $$("#tabs button").forEach(x => x.classList.remove("active"));
  document.querySelector('#tabs button[data-tab="practice"]').classList.add("active");
  ["practice","exam","wrong","search","all"].forEach(t => $("#tab-" + t).hidden = (t !== "practice"));
  renderPractice();
};

/* ============================================================
 *  搜索
 * ============================================================ */
$("#searchInput").addEventListener("input", e => {
  const kw = e.target.value.trim().toLowerCase();
  if(!kw){ $("#searchList").innerHTML = '<div class="empty">输入关键词开始搜索</div>'; return; }
  const hits = QUESTIONS.filter(q =>
    q.question.toLowerCase().includes(kw) || q.answer.toLowerCase().includes(kw) || q.category.toLowerCase().includes(kw)
  );
  if(!hits.length){ $("#searchList").innerHTML = '<div class="empty">未找到匹配结果</div>'; return; }
  $("#searchList").innerHTML = `<div style="padding:10px 14px;color:var(--mute);font-size:13px">命中 ${hits.length} 题</div>` + hits.map(q => `
    <div class="listitem">
      <div class="lq">
        <div><span class="pill cat">${q.category}</span> <strong>${highlight(q.question, kw)}</strong></div>
        <details open><summary>答案</summary><div style="margin-top:6px;color:#bbf7d0">${highlight(q.answer, kw)}</div></details>
      </div>
    </div>
  `).join("");
});
function highlight(text, kw){
  const safe = escapeHtml(text);
  if(!kw) return safe;
  const re = new RegExp("(" + kw.replace(/[.*+?^${}()|[\]\\]/g,'\\$&') + ")", "ig");
  return safe.replace(re, '<mark style="background:rgba(34,211,238,.3);color:#fff;padding:0 2px;border-radius:3px">$1</mark>');
}

/* ============================================================
 *  全部题目
 * ============================================================ */
function renderAll(){
  const stats = CATEGORIES.map(c => ({
    cat: c, n: QUESTIONS.filter(q => q.category === c).length
  }));
  $("#catStats").innerHTML = stats.map(s =>
    `<div class="stat"><div class="num">${s.n}</div><div class="lbl">${s.cat}</div></div>`
  ).join("");
  $("#allList").innerHTML = QUESTIONS.map(q => `
    <div class="listitem">
      <div class="lq">
        <div><span class="pill">#${q.no}</span> <span class="pill cat">${q.category}</span> <strong>${escapeHtml(q.question)}</strong></div>
        <details><summary>答案</summary><div style="margin-top:6px;color:#bbf7d0">${escapeHtml(q.answer)}</div></details>
      </div>
    </div>
  `).join("");
}

/* ============================================================
 *  用户切换
 * ============================================================ */
$("#userName").addEventListener("change", e => {
  currentUser = e.target.value.trim();
  localStorage.setItem(STORE_PREFIX + "__lastUser", currentUser);
  initUser();
});
function initUser(){
  const d = loadUserData();
  currentIndex = d.practiceIdx || 0;
  rebuildPracticeList();
  renderPractice();
}

/* ============================================================
 *  启动
 * ============================================================ */
function boot(){
  $("#totalQs").textContent = QUESTIONS.length;
  fillCategorySelects();
  currentUser = localStorage.getItem(STORE_PREFIX + "__lastUser") || "";
  $("#userName").value = currentUser;
  initUser();
}
boot();
</script>
